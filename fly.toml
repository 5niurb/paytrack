# paytrack (LM PayTrack) on Fly.io
# Migrated from Render 2026-05-30 to escape the shared 750 free-instance-hours cap.
#
# Always-on (min_machines_running = 1) so employees entering time daily never hit
# a cold start. A single shared-cpu-1x:512MB machine running 24/7 ≈ $3.19/mo —
# under Fly's ~$5/mo invoice waiver, so it's effectively free AND always warm.
# KEEP IT TO ONE MACHINE (no HA pair) and don't bump RAM — a second machine or
# larger size would push past the free threshold.
app = "lm-paytrack"
primary_region = "sjc"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"    # NEVER auto-stop — keep the single machine always warm
  auto_start_machines = true    # belt-and-suspenders if it ever does stop
  min_machines_running = 1      # one machine always running — no cold starts

  [http_service.http_checks]
    # No dedicated /health route; the app root returns 200, so check "/".
    [[http_service.checks]]
      grace_period = "20s"
      interval = "30s"
      method = "GET"
      timeout = "5s"
      path = "/"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
